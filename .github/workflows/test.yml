name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: minicacher/go.mod
          cache-dependency-path: minicacher/go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run tests
        run: task test
