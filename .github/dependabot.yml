version: 2

updates:
  # =====================
  # Bun
  # =====================
  - package-ecosystem: "npm"
    directory: "/test"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "bun"
      include: "scope"
    groups:
      npm-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      npm-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # =====================
  # Go Modules
  # =====================
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "go"
      include: "scope"
    groups:
      go-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      go-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # =====================
  # Docker Compose
  # =====================
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker-images:
        patterns:
          - "*"

  # =====================
  # Dockerfiles
  # =====================
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
      include: "scope"

  # =====================
  # GitHub Actions
  # =====================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
