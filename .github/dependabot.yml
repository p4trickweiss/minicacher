version: 2

updates:
  # =====================
  # Bun (MiniCacheR)
  # =====================
  - package-ecosystem: "npm"
    directory: "/minicacher/test"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "bun"
      include: "scope"
    groups:
      npm-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      npm-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # =====================
  # Go Modules (MiniCacheR)
  # =====================
  - package-ecosystem: "gomod"
    directory: "/minicacher"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "go"
      include: "scope"
    groups:
      go-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      go-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # =====================
  # Go Modules (operator)
  # =====================
  - package-ecosystem: "gomod"
    directory: "/operator"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "go"
      include: "scope"
    groups:
      go-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      go-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # =====================
  # Docker (MiniCacheR)
  # =====================
  - package-ecosystem: "docker"
    directory: "/minicacher/build"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker-images:
        patterns:
          - "*"

  # =====================
  # Docker (operator)
  # =====================
  - package-ecosystem: "docker"
    directory: "/operator"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker-images:
        patterns:
          - "*"

  # =====================
  # GitHub Actions
  # =====================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
