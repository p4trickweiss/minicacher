# https://taskfile.dev

version: "3"

tasks:
  run:
    desc: Run the cache application
    cmds:
      - go run cmd/cache/main.go

  build:cache:
    desc: Build the cache Docker image
    cmds:
      - docker build -f build/cache/Dockerfile -t ghcr.io/p4trickweiss/distributed-cache:latest .

  build:operator:
    desc: Build the operator Docker image
    cmds:
      - docker build -f build/operator/Dockerfile -t ghcr.io/p4trickweiss/distributed-cache-operator:latest .

  build:
    desc: Build all Docker images
    cmds:
      - task: build:cache
      - task: build:operator

  docker-compose:up:
    desc: Run the docker-compose file
    cmds:
      - docker compose -f deployments/docker-compose.yml up -d

  docker-compose:down:
    desc: Stop the docker-compose file
    cmds:
      - docker compose -f deployments/docker-compose.yml down

  test:unit:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:integration:
    deps:
      - docker-compose:up
    desc: Run integration tests
    dir: test/
    cmds:
      - bun test
      - task docker-compose:down

  test:
    desc: Run all tests
    cmds:
      - task test:unit
      - task test:integration
